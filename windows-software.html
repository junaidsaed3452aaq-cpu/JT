<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Software Hub - Junaid Tech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <style>
        .software-container { width: 90%; max-width: 1200px; margin: 120px auto 60px auto; }
        .section-title { text-align: center; font-size: 38px; margin-bottom: 30px; background: linear-gradient(90deg, #ffffff, #0078d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .top-actions-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        
        .search-box-wrapper { position: relative; flex: 1; max-width: 400px; min-width: 250px; }
        .search-box-wrapper input { width: 100%; padding: 12px 18px 12px 45px; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 14px; color: #fff; outline: none; transition: 0.3s; backdrop-filter: blur(10px); }
        .search-box-wrapper input:focus { border-color: #0078d7; box-shadow: 0 0 15px rgba(0, 120, 215, 0.3); }
        .search-box-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #8b949e; font-size: 16px; }

        .admin-trigger-box { display: flex; gap: 12px; }
        .unlock-admin-btn { background: rgba(0, 120, 215, 0.15); color: #4ea4ff; border: 1px solid rgba(0, 120, 215, 0.3); padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .unlock-admin-btn:hover { background: #0078d7; color: #fff; box-shadow: 0 0 15px #0078d7; }
        .settings-btn { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .settings-btn:hover { background: #f59e0b; color: #fff; box-shadow: 0 0 15px #f59e0b; }

        .admin-panel { display: none; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 120, 215, 0.3); padding: 30px; border-radius: 25px; margin-bottom: 40px; backdrop-filter: blur(15px); }
        .settings-panel-border { border-color: rgba(245, 158, 11, 0.4); }
        .admin-panel h3 { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .title-blue { color: #0078d7; }
        .title-orange { color: #f59e0b; }
        
        .close-admin-btn { background: rgba(239, 68, 68, 0.2); color: #f87171; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
        .admin-form-group { margin-bottom: 15px; }
        .admin-form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #d5d5d5; }
        .admin-form-group input, .admin-form-group textarea { width: 100%; padding: 12px 18px; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; outline: none; }
        
        .password-input-wrapper { position: relative; }
        .password-input-wrapper input { width: 100%; padding-right: 45px; }
        .password-input-wrapper .toggle-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #8b949e; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .password-input-wrapper .toggle-eye:hover { color: #fff; }

        .checkbox-container { background: rgba(0, 120, 215, 0.08); border: 1px solid rgba(0, 120, 215, 0.2); padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .checkbox-container input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #0078d7; display: inline-block; position: static; margin: 0; }
        .checkbox-container label { color: #4ea4ff; font-weight: 600; cursor: pointer; margin-bottom: 0; font-size: 15px; display: inline-block; }

        #client-field-box { display: none; background: rgba(0, 0, 0, 0.25); border-left: 4px solid #0078d7; padding: 20px; border-radius: 0 12px 12px 0; margin-bottom: 20px; }

        .upload-btn { background: #0078d7; color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; font-size: 16px; margin-top: 10px; }
        .upload-btn:hover { background: #005fa3; box-shadow: 0 0 15px #0078d7; }

        .setting-list-item { background: rgba(0, 0, 0, 0.2); padding: 15px 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .setting-info strong { color: #fff; font-size: 16px; display: block; margin-bottom: 5px; }
        .setting-actions button { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; margin-left: 5px; }
        .btn-set-pass { background: #0078d7; color: white; }
        .btn-rem-pass { background: #f59e0b; color: white; }
        .btn-delete { background: #ef4444; color: white; }

        .software-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .software-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 25px; padding: 25px; backdrop-filter: blur(12px); display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .software-card:hover { border-color: #0078d7; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 120, 215, 0.2); }
        
        .software-title { font-size: 20px; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .client-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0, 120, 215, 0.2); color: #4ea4ff; border: 1px solid rgba(0, 120, 215, 0.4); padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .software-desc { font-size: 14px; color: #9ca3af; margin-bottom: 15px; line-height: 1.5; }
        
        .clients-dropdown-box { margin-bottom: 15px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; overflow: hidden; }
        .clients-toggle-btn { width: 100%; background: rgba(16, 185, 129, 0.15); color: #34d399; border: none; padding: 10px 15px; text-align: left; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .clients-toggle-btn:hover { background: rgba(16, 185, 129, 0.25); }
        .clients-list-content { display: none; padding: 10px 15px; max-height: 120px; overflow-y: auto; font-size: 13px; color: #d1d5db; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .clients-list-content div { padding: 4px 0; border-bottom: 1px dashed rgba(255, 255, 255, 0.05); }
        .clients-list-content div:last-child { border-bottom: none; }

        .download-btn { width: 100%; background: rgba(0, 120, 215, 0.2); color: #4ea4ff; border: 1px solid rgba(0, 120, 215, 0.4); padding: 12px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.3s; }
        .download-btn:hover { background: #0078d7; color: #fff; box-shadow: 0 0 15px #0078d7; }
    </style>
</head>
<body>

<header>
    <div class="logo">JD Windows Hub</div>
    <nav><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></nav>
</header>

<div class="software-container">
    <h2 class="section-title">Windows Software Hub</h2>

    <div class="top-actions-bar">
        <div class="search-box-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search by your name or software..." onkeyup="loadSoftwares()">
        </div>
        <div class="admin-trigger-box">
            <button class="unlock-admin-btn" onclick="promptAdminLogin()"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</button>
            <button class="unlock-admin-btn settings-btn" onclick="promptAdminSettings()"><i class="fa-solid fa-gear"></i> Settings</button>
        </div>
    </div>

    <div class="admin-panel" id="admin-panel">
        <h3 class="title-blue">
            <span><i class="fa-solid fa-cloud-arrow-up"></i> Upload New Windows Software</span>
            <button class="close-admin-btn" onclick="hidePanels()"><i class="fa-solid fa-xmark"></i></button>
        </h3>
        <div class="admin-form-group">
            <label>Software Name</label>
            <input type="text" id="soft-name" placeholder="e.g. Windows Setup Tool">
        </div>
        <div class="admin-form-group">
            <label>Description</label>
            <textarea id="soft-desc" placeholder="Write short details..." rows="2"></textarea>
        </div>
        <div class="admin-form-group">
            <label>Download Link</label>
            <input type="text" id="soft-link" placeholder="Paste direct download link here">
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="is-client-app" onchange="toggleClientBox()">
            <label for="is-client-app">Dedicated Client Software (Check to set Client Name & Password)</label>
        </div>

        <div id="client-field-box">
            <div class="admin-form-group">
                <label><i class="fa-solid fa-user"></i> Client Name</label>
                <input type="text" id="client-name" placeholder="Enter client name">
            </div>
            <div class="admin-form-group">
                <label><i class="fa-solid fa-key"></i> Secret Password for this Client</label>
                <div class="password-input-wrapper">
                    <input type="password" id="client-password" placeholder="Enter password">
                    <i class="fa-solid fa-eye toggle-eye" onclick="togglePasswordVisibility('client-password', this)"></i>
                </div>
            </div>
        </div>

        <button class="upload-btn" onclick="uploadSoftware()">Publish Software</button>
    </div>

    <div class="admin-panel settings-panel-border" id="admin-settings-panel">
        <h3 class="title-orange">
            <span><i class="fa-solid fa-gear"></i> Manage Uploaded Softwares</span>
            <button class="close-admin-btn" onclick="hidePanels()"><i class="fa-solid fa-xmark"></i></button>
        </h3>
        <div id="settings-software-list"></div>
    </div>

    <div class="software-grid" id="software-grid"></div>
</div>

<script>
    const ADMIN_SECRET = "Sa1122@@";
    const GITHUB_USER = "junaidsaed3452aaq-cpu";
    const GITHUB_REPO = "Junaid-Tech-Point";
    const FILE_PATH = "windows-software.json";
    const JSON_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${FILE_PATH}`;

    window.addEventListener("DOMContentLoaded", loadSoftwares);

    function getGitHubToken() {
        let token = localStorage.getItem("github_pat_token");
        if (!token) {
            token = prompt("Enter your GitHub Personal Access Token (PAT) for cloud sync:");
            if (token) localStorage.setItem("github_pat_token", token.trim());
        }
        return token;
    }

    function togglePasswordVisibility(fieldId, iconElement) {
        const field = document.getElementById(fieldId);
        if (field.type === "password") {
            field.type = "text";
            iconElement.classList.remove("fa-eye");
            iconElement.classList.add("fa-eye-slash");
        } else {
            field.type = "password";
            iconElement.classList.remove("fa-eye-slash");
            iconElement.classList.add("fa-eye");
        }
    }

    function toggleClientBox() {
        const checkBox = document.getElementById("is-client-app");
        const clientBox = document.getElementById("client-field-box");
        if (checkBox.checked) {
            clientBox.style.display = "block";
        } else {
            clientBox.style.display = "none";
            document.getElementById("client-name").value = "";
            document.getElementById("client-password").value = "";
        }
    }

    function promptAdminLogin() {
        if (prompt("Enter Admin Password:") === ADMIN_SECRET) {
            hidePanels();
            document.getElementById("admin-panel").style.display = "block";
        } else { alert("Incorrect Password!"); }
    }

    function promptAdminSettings() {
        if (prompt("Enter Admin Password:") === ADMIN_SECRET) {
            hidePanels();
            document.getElementById("admin-settings-panel").style.display = "block";
            loadSettingsList();
        } else { alert("Incorrect Password!"); }
    }

    function hidePanels() {
        document.getElementById("admin-panel").style.display = "none";
        document.getElementById("admin-settings-panel").style.display = "none";
    }

    async function fetchSoftwaresFromCloud() {
        try {
            let response = await fetch(JSON_URL + "?t=" + Date.now());
            if (!response.ok) return [];
            let data = await response.json();
            return Array.isArray(data) ? data : [];
        } catch (error) {
            return [];
        }
    }

    async function saveSoftwaresToCloud(softwares) {
        const token = getGitHubToken();
        if (!token) { alert("GitHub Token is required to save changes!"); return false; }

        const apiURL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        
        try {
            let getRes = await fetch(apiURL, {
                headers: { "Authorization": `token ${token}` }
            });
            let sha = "";
            if (getRes.ok) {
                let fileData = await getRes.json();
                sha = fileData.sha;
            }

            let jsonString = JSON.stringify(softwares, null, 2);
            let contentEncoded = btoa(unescape(encodeURIComponent(jsonString)));

            let putRes = await fetch(apiURL, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update windows-software.json via admin panel",
                    content: contentEncoded,
                    sha: sha
                })
            });

            if (putRes.ok) {
                return true;
            } else {
                let errData = await putRes.json();
                alert("GitHub Sync Failed: " + (errData.message || "Unknown error"));
                return false;
            }
        } catch (error) {
            alert("Network error during GitHub sync!");
            return false;
        }
    }

    async function uploadSoftware() {
        const name = document.getElementById("soft-name").value.trim();
        const desc = document.getElementById("soft-desc").value.trim();
        const link = document.getElementById("soft-link").value.trim();
        const isClientApp = document.getElementById("is-client-app").checked;
        
        let clientName = "";
        let password = "";

        if (!name || !link) return alert("Please fill Software Name and Download Link!");

        if (isClientApp) {
            clientName = document.getElementById("client-name").value.trim();
            password = document.getElementById("client-password").value.trim();
            if (!clientName || !password) return alert("Please enter both Client Name and Password!");
        }

        let softwares = await fetchSoftwaresFromCloud();
        softwares.push({ 
            id: Date.now(), name, desc, link, 
            clientName: clientName || "", password: password || "", downloadClients: [] 
        });

        let success = await saveSoftwaresToCloud(softwares);
        if (success) {
            document.getElementById("soft-name").value = "";
            document.getElementById("soft-desc").value = "";
            document.getElementById("soft-link").value = "";
            document.getElementById("client-name").value = "";
            document.getElementById("client-password").value = "";
            document.getElementById("is-client-app").checked = false;
            document.getElementById("client-field-box").style.display = "none";
            hidePanels();
            loadSoftwares();
            alert("Software successfully published!");
        }
    }

    async function loadSoftwares() {
        const grid = document.getElementById("software-grid");
        const searchQuery = document.getElementById("search-input").value.toLowerCase().trim();
        
        grid.innerHTML = `<p style="color: #4ea4ff; text-align: center; grid-column: 1/-1;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</p>`;
        let softwares = await fetchSoftwaresFromCloud();

        if (softwares.length === 0) {
            grid.innerHTML = `<p style="color: #9ca3af; text-align: center; grid-column: 1/-1;">No Windows software uploaded yet.</p>`;
            return;
        }

        grid.innerHTML = "";
        let foundAny = false;

        softwares.forEach(soft => {
            let matchName = soft.name.toLowerCase().includes(searchQuery);
            let matchClient = soft.clientName && soft.clientName.toLowerCase().includes(searchQuery);
            let matchDesc = soft.desc.toLowerCase().includes(searchQuery);

            if (searchQuery !== "" && !matchName && !matchClient && !matchDesc) return;
            foundAny = true;
            
            let clientBadgeHTML = soft.clientName ? `<div class="client-badge"><i class="fa-solid fa-user-shield"></i> Created for: ${soft.clientName}</div>` : "";
            
            let dropdownHTML = "";
            if (soft.downloadClients && soft.downloadClients.length > 0) {
                let listItems = "";
                soft.downloadClients.forEach(c => {
                    listItems += `<div><i class="fa-solid fa-user"></i> <b>${c.name}</b> (${c.count})</div>`;
                });
                dropdownHTML = `
                <div class="clients-dropdown-box">
                    <button class="clients-toggle-btn" onclick="toggleClientList(${soft.id})">
                        <span><i class="fa-solid fa-users"></i> Downloaded Clients (${soft.downloadClients.length})</span>
                        <i class="fa-solid fa-chevron-down" id="chevron-${soft.id}"></i>
                    </button>
                    <div class="clients-list-content" id="list-content-${soft.id}">${listItems}</div>
                </div>`;
            }

            grid.innerHTML += `
            <div class="software-card">
                <div>
                    <div class="software-title"><i class="fa-brands fa-windows" style="color:#0078d7;"></i> ${soft.name}</div>
                    ${clientBadgeHTML}
                    <div class="software-desc">${soft.desc || "No description."}</div>
                    ${dropdownHTML}
                </div>
                <div><button class="download-btn" onclick="handleDownload(${soft.id})"><i class="fa-solid fa-download"></i> Download Software</button></div>
            </div>`;
        });

        if (!foundAny) grid.innerHTML = `<p style="color: #9ca3af; text-align: center; grid-column: 1/-1;">No matching software found.</p>`;
    }

    function toggleClientList(id) {
        const content = document.getElementById(`list-content-${id}`);
        const chevron = document.getElementById(`chevron-${id}`);
        if (!content) return;
        content.style.display = content.style.display === "block" ? "none" : "block";
        chevron.style.transform = content.style.display === "block" ? "rotate(180deg)" : "rotate(0deg)";
    }

    async function handleDownload(id) {
        let softwares = await fetchSoftwaresFromCloud();
        const soft = softwares.find(s => s.id === id);
        if (!soft) return;

        let userName = prompt("Please enter your name:");
        if (userName === null) return;
        userName = userName.trim();
        if (userName === "" || !/^[\p{L}\s]+$/u.test(userName)) return alert("Invalid name!");

        if (soft.password && soft.password.trim() !== "") {
            const enteredPass = prompt("Enter password:");
            if (enteredPass !== soft.password) return alert("Wrong Password!");
        }

        if (!soft.downloadClients) soft.downloadClients = [];
        let existingClient = soft.downloadClients.find(c => c.name.toLowerCase() === userName.toLowerCase());
        if (existingClient) existingClient.count += 1;
        else soft.downloadClients.push({ name: userName, count: 1 });

        await saveSoftwaresToCloud(softwares);
        window.open(soft.link, '_blank');
        loadSoftwares();
    }

    async function loadSettingsList() {
        const list = document.getElementById("settings-software-list");
        let softwares = await fetchSoftwaresFromCloud();
        if (softwares.length === 0) { list.innerHTML = `<p style="color: #9ca3af;">No software uploaded.</p>`; return; }

        let html = "";
        softwares.forEach(soft => {
            let status = soft.password ? `<span style="color:#f87171;"><i class="fa-solid fa-lock"></i> Locked</span>` : `<span style="color:#4ade80;"><i class="fa-solid fa-lock-open"></i> Public</span>`;
            html += `
            <div class="setting-list-item">
                <div class="setting-info"><strong>${soft.name}</strong>${status}</div>
                <div class="setting-actions">
                    <button class="btn-set-pass" onclick="setPassword(${soft.id})">Set Pass</button>
                    <button class="btn-rem-pass" onclick="removePassword(${soft.id})">Remove Pass</button>
                    <button class="btn-delete" onclick="deleteSoftware(${soft.id})"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    async function setPassword(id) {
        let softwares = await fetchSoftwaresFromCloud();
        let index = softwares.findIndex(s => s.id === id);
        if (index !== -1) {
            let newPass = prompt("Enter new password:");
            if (newPass) { softwares[index].password = newPass.trim(); await saveSoftwaresToCloud(softwares); loadSettingsList(); loadSoftwares(); }
        }
    }

    async function removePassword(id) {
        let softwares = await fetchSoftwaresFromCloud();
        let index = softwares.findIndex(s => s.id === id);
        if (index !== -1 && confirm("Make public?")) {
            softwares[index].password = ""; softwares[index].clientName = "";
            await saveSoftwaresToCloud(softwares); loadSettingsList(); loadSoftwares();
        }
    }

    async function deleteSoftware(id) {
        let softwares = await fetchSoftwaresFromCloud();
        let index = softwares.findIndex(s => s.id === id);
        if (index !== -1 && confirm("Delete?")) {
            softwares.splice(index, 1); await saveSoftwaresToCloud(softwares); loadSettingsList(); loadSoftwares();
        }
    }
</script>
</body>
</html>
